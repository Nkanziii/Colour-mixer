<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Mixer</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1 align="center">Colour Mixer</h1> 
  


  <div id="color-preview" align="center">

    <p id="hex-code" #ffda79>#000000</p>

    <div id="colors">
        <label>Red
            <input type="range" id="red" name="red" min="0" max="255" value="0"> 
        </label>

        <label>Green
            <input type="range" id="green" name="green" min="0" max="255" value="0">
        </label>

        <label>Blue
            <input type="range" id="blue" name="blue" min="0" max="255" value="0">
        </label>

    </div>
  </div>

    <script src="script.js"></script>
</body>
